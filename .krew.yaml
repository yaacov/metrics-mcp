apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: metrics
spec:
  version: {{ .TagName }}
  homepage: https://github.com/yaacov/kubectl-metrics
  shortDescription: Query Prometheus/Thanos metrics on OpenShift clusters
  description: |
    kubectl-metrics is a kubectl plugin for querying Prometheus and Thanos
    metrics on OpenShift clusters. It works as both a CLI tool and an MCP
    server for AI assistants (Claude Desktop, Cursor IDE, OpenShift Lightspeed).

    Features:
    - Discover available metrics with keyword filtering
    - Run instant and range PromQL queries
    - Preset queries for common metrics (storage, network, migrations)
    - Auto-discovers Prometheus/Thanos from cluster routes
    - MCP server mode (stdio and SSE) for AI assistant integration
    - Standard kubectl authentication (kubeconfig, context, token)
  caveats: |
    This plugin requires kubectl to be installed and configured to access
    an OpenShift cluster with Prometheus/Thanos deployed.

    Examples:
      # Discover available metrics
      kubectl metrics discover --keyword http

      # Run an instant query
      kubectl metrics query --query "up"

      # Run a preset query
      kubectl metrics preset --name mtv_migration_status

      # Start MCP server for AI assistants
      kubectl metrics mcp-server
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    {{addURIAndSha "https://github.com/yaacov/kubectl-metrics/releases/download/{{ .TagName }}/kubectl-metrics-{{ .TagName }}-linux-amd64.tar.gz" .TagName }}
    files:
    - from: kubectl-metrics-linux-amd64
      to: kubectl-metrics
    - from: LICENSE
      to: .
    bin: kubectl-metrics
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    {{addURIAndSha "https://github.com/yaacov/kubectl-metrics/releases/download/{{ .TagName }}/kubectl-metrics-{{ .TagName }}-linux-arm64.tar.gz" .TagName }}
    files:
    - from: kubectl-metrics-linux-arm64
      to: kubectl-metrics
    - from: LICENSE
      to: .
    bin: kubectl-metrics
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    {{addURIAndSha "https://github.com/yaacov/kubectl-metrics/releases/download/{{ .TagName }}/kubectl-metrics-{{ .TagName }}-darwin-amd64.tar.gz" .TagName }}
    files:
    - from: kubectl-metrics-darwin-amd64
      to: kubectl-metrics
    - from: LICENSE
      to: .
    bin: kubectl-metrics
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    {{addURIAndSha "https://github.com/yaacov/kubectl-metrics/releases/download/{{ .TagName }}/kubectl-metrics-{{ .TagName }}-darwin-arm64.tar.gz" .TagName }}
    files:
    - from: kubectl-metrics-darwin-arm64
      to: kubectl-metrics
    - from: LICENSE
      to: .
    bin: kubectl-metrics
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    {{addURIAndSha "https://github.com/yaacov/kubectl-metrics/releases/download/{{ .TagName }}/kubectl-metrics-{{ .TagName }}-windows-amd64.zip" .TagName }}
    files:
    - from: kubectl-metrics-windows-amd64.exe
      to: kubectl-metrics.exe
    - from: LICENSE
      to: .
    bin: kubectl-metrics.exe
